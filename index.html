---
layout: default
---

<div class="hugespacer"></div>

<div class="row">
	<div class="col-md-12">
		<div class="smallhead">
			Some placeholder text.    
		</div>
	</div>				
</div>

<div class="hugespacer"></div>

<div class="posts">
  {% for post in site.posts %}
    <article class="post">

      <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>

      <div class="entry">
        {{ post.excerpt }}
      </div>

      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
    </article>
  {% endfor %}
</div>
